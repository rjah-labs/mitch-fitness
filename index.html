<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mitch — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d1117; --surface: #161b22; --surface2: #1c2128; --surface3: #21262d;
    --border: #30363d; --border2: #444c56;
    --text: #e6edf3; --text-dim: #8b949e; --text-muted: #6e7681;
    --green: #238636; --green-light: #3fb950; --green-dim: rgba(63,185,80,0.12);
    --blue: #58a6ff; --blue-dim: rgba(88,166,255,0.1);
    --purple: #a371f7; --purple-dim: rgba(163,113,247,0.12);
    --pink: #f778ba; --pink-dim: rgba(247,120,186,0.12);
    --amber: #d29922; --amber-dim: rgba(210,153,34,0.12);
    --red: #f85149; --red-dim: rgba(248,81,73,0.12);
    --teal: #39d353; --teal-dim: rgba(57,211,83,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; display: flex; flex-direction: column; }

  .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .screen.active { display: flex; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .topbar-back { background: none; border: none; color: var(--blue); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; }
  .topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.04em; flex: 1; }
  .topbar-action { background: none; border: 1px solid var(--border2); color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 6px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .topbar-action.primary { border-color: var(--green); color: var(--green-light); background: rgba(35,134,54,0.12); }
  .topbar-action.danger { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .topbar-action.purple { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }
  .topbar-action:active { opacity: 0.7; }

  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }
  .scroll::-webkit-scrollbar { display: none; }

  /* HERO */
  .home-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; text-align: center; }
  .home-hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--purple); text-transform: uppercase; margin-bottom: 6px; }
  .home-hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.03em; line-height: 1; }
  .home-hero-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .sync-status { margin-top: 4px; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; margin-top: 20px; }
  .section-label:first-of-type { margin-top: 0; }

  /* SETUP */
  .setup-card { background: var(--surface2); border: 1px solid var(--amber); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .setup-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
  .setup-input { width: 100%; background: var(--surface3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; margin-bottom: 8px; }
  .setup-input:focus { outline: none; border-color: var(--blue); }
  .setup-btn { width: 100%; padding: 12px; background: rgba(35,134,54,0.15); border: 1px solid var(--green); border-radius: 8px; color: var(--green-light); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; cursor: pointer; }
  .setup-btn:active { background: rgba(35,134,54,0.3); }

  /* WORKOUT LIST */
  .workout-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
  .workout-card:active { background: var(--surface3); }
  .workout-card.has-sessions { border-color: var(--purple); }
  .workout-icon { font-size: 24px; flex-shrink: 0; width: 40px; text-align: center; }
  .workout-info { flex: 1; }
  .workout-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .workout-meta { font-size: 12px; color: var(--text-dim); }
  .workout-arrow { color: var(--text-muted); font-size: 18px; }
  .workout-session-count { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--purple); border: 1px solid var(--purple); border-radius: 4px; padding: 2px 6px; }

  .new-workout-btn { width: 100%; padding: 14px; background: var(--purple-dim); border: 1px dashed var(--purple); border-radius: 10px; color: var(--purple); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; cursor: pointer; margin-bottom: 16px; }
  .new-workout-btn:active { background: rgba(163,113,247,0.2); }

  /* BUILDER */
  .builder-exercise { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .builder-ex-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .builder-ex-name { font-size: 14px; font-weight: 500; flex: 1; }
  .builder-ex-remove { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; padding: 2px 6px; }
  .builder-scheme { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
  .builder-input { background: var(--surface3); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 10px; color: var(--text); font-size: 15px; text-align: center; width: 100%; font-family: 'DM Sans', sans-serif; }
  .builder-input:focus { outline: none; border-color: var(--blue); }
  .builder-input-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 3px; }
  .builder-type-pill { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

  .add-exercise-btn { width: 100%; padding: 14px; background: var(--blue-dim); border: 1px dashed var(--blue); border-radius: 10px; color: var(--blue); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; cursor: pointer; margin-bottom: 16px; }
  .add-exercise-btn:active { background: rgba(88,166,255,0.18); }

  /* EXERCISE PICKER */
  .picker-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .picker-cat-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
  .picker-cat-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .picker-search { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; }
  .picker-search:focus { outline: none; border-color: var(--blue); }
  .picker-ex-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .picker-ex-item:active { background: var(--surface3); }
  .picker-ex-info { flex: 1; }
  .picker-ex-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .picker-ex-meta { font-size: 11px; color: var(--text-dim); }
  .picker-ex-add { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--green); background: var(--green-dim); color: var(--green-light); font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .muscle-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; padding: 1px 6px; border-radius: 4px; margin-right: 3px; }
  .mt-glutes { background: var(--pink-dim); color: var(--pink); border: 1px solid rgba(247,120,186,0.3); }
  .mt-legs { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .mt-back { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(210,153,34,0.3); }
  .mt-chest { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(163,113,247,0.3); }
  .mt-shoulders { background: rgba(57,211,83,0.1); color: var(--teal); border: 1px solid rgba(57,211,83,0.25); }
  .mt-arms { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
  .mt-core { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border2); }
  .mt-cardio { background: var(--green-dim); color: var(--green-light); border: 1px solid rgba(63,185,80,0.3); }

  /* SESSION SCREEN */
  .session-meta { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .session-meta-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 4px; }
  .session-meta-name { font-size: 16px; font-weight: 500; }

  .exercise-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .exercise-header { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .exercise-name-text { font-size: 14px; font-weight: 500; flex: 1; }
  .exercise-target-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--amber); }
  .exercise-pr-chip { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--green-light); background: var(--green-dim); border: 1px solid rgba(63,185,80,0.2); border-radius: 4px; padding: 2px 6px; }

  .sets-area { border-top: 1px solid var(--border); padding: 12px 16px; }
  .sets-labels { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; margin-bottom: 4px; }
  .sets-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); text-align: center; letter-spacing: 0.08em; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-align: center; }
  .set-input { background: var(--surface3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 6px; color: var(--text); font-size: 16px; text-align: center; width: 100%; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }
  .set-input:focus { outline: none; border-color: var(--blue); background: var(--surface2); }
  .set-input::placeholder { color: var(--text-muted); font-size: 12px; }
  .set-input.completed { border-color: var(--green); background: rgba(63,185,80,0.06); }
  .set-done-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface3); color: var(--text-muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .set-done-btn.done { background: var(--green-dim); border-color: var(--green); color: var(--green-light); }
  .add-set-btn { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border2); border-radius: 8px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; cursor: pointer; margin-top: 4px; }

  /* CARDIO BLOCK */
  .cardio-block { background: var(--surface2); border: 1px solid var(--green); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .cardio-header { padding: 13px 16px; display: flex; align-items: center; gap: 10px; }
  .cardio-icon { font-size: 22px; }
  .cardio-name { font-size: 14px; font-weight: 500; flex: 1; }
  .cardio-inputs { border-top: 1px solid var(--border); padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .cardio-input-wrap { display: flex; flex-direction: column; gap: 4px; }
  .cardio-input { background: var(--surface3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 6px; color: var(--text); font-size: 15px; text-align: center; width: 100%; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }
  .cardio-input:focus { outline: none; border-color: var(--green); }
  .cardio-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); text-align: center; letter-spacing: 0.06em; }
  .cardio-done-row { border-top: 1px solid var(--border); padding: 10px 16px; }
  .cardio-done-btn { width: 100%; padding: 10px; background: var(--green-dim); border: 1px solid var(--green); border-radius: 8px; color: var(--green-light); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; cursor: pointer; }
  .cardio-done-btn.done { background: rgba(63,185,80,0.25); }

  .session-notes-area { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .session-notes-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .session-notes-input { width: 100%; background: var(--surface3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; min-height: 70px; }
  .session-notes-input:focus { outline: none; border-color: var(--blue); }

  .save-btn { width: 100%; padding: 16px; background: rgba(35,134,54,0.2); border: 1px solid var(--green); border-radius: 10px; color: var(--green-light); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; cursor: pointer; margin-bottom: 20px; }
  .save-btn:active { background: rgba(35,134,54,0.4); }

  /* HISTORY */
  .history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .history-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
  .history-ex-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .history-ex-row:last-child { border-bottom: none; }
  .history-ex-name { color: var(--text-dim); }
  .history-ex-best { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--amber); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* TOAST + TIMER */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green-light); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .rest-timer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; display: none; align-items: center; justify-content: space-between; z-index: 100; }
  .rest-timer.show { display: flex; }
  .rest-timer-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; }
  .rest-timer-count { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--amber); }
  .rest-timer-count.done { color: var(--green-light); }
  .rest-timer-close { background: none; border: 1px solid var(--border2); color: var(--text-muted); border-radius: 6px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }

  /* ANALYSIS */
  .analysis-stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
  .analysis-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .analysis-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 0.03em; line-height: 1; }
  .analysis-stat-lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 4px; }
  .analysis-stat-val.purple { color: var(--purple); }
  .analysis-stat-val.green { color: var(--green-light); }
  .analysis-stat-val.amber { color: var(--amber); }
  .analysis-stat-val.pink { color: var(--pink); }

  .analysis-section { margin-bottom: 20px; }
  .analysis-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.04em; margin-bottom: 10px; color: var(--text-dim); }

  .pr-list { display: flex; flex-direction: column; gap: 8px; }
  .pr-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
  .pr-name { font-size: 13px; color: var(--text); flex: 1; }
  .pr-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--amber); font-weight: 500; }
  .pr-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .chart-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; overflow: hidden; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .chart-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
  .chart-select { background: var(--surface3); border: 1px solid var(--border2); border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; margin-bottom: 12px; width: 100%; }
  .chart-select:focus { outline: none; border-color: var(--blue); }

  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); width: 70px; flex-shrink: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; background: var(--surface3); border-radius: 4px; height: 24px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; padding-left: 8px; }
  .bar-fill-val { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.8); white-space: nowrap; }

  .line-chart { position: relative; width: 100%; height: 120px; }
  .line-chart svg { width: 100%; height: 100%; }

  .freq-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .freq-cell { aspect-ratio: 1; border-radius: 3px; background: var(--surface3); }
  .freq-cell.l1 { background: rgba(163,113,247,0.25); }
  .freq-cell.l2 { background: rgba(163,113,247,0.5); }
  .freq-cell.l3 { background: rgba(163,113,247,0.75); }
  .freq-cell.l4 { background: var(--purple); }
  .freq-day-labels { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 6px; }
  .freq-day-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); text-align: center; }

  .workout-breakdown { display: flex; flex-direction: column; gap: 6px; }
  .wb-item { display: flex; align-items: center; gap: 10px; }
  .wb-name { font-size: 12px; color: var(--text-dim); flex: 1; }
  .wb-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--purple); }
  .wb-bar { height: 6px; border-radius: 3px; background: var(--purple); opacity: 0.6; margin-top: 2px; }

  .no-data { text-align:center; padding: 2rem; color: var(--text-muted); font-size: 13px; }

  .link-banner { background: var(--surface2); border: 1px solid var(--purple); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .link-banner-text { font-size: 13px; color: var(--text-dim); }
  .link-banner-url { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--purple); margin-top: 2px; }
  .link-banner-copy { background: none; border: 1px solid var(--purple); color: var(--purple); border-radius: 6px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; white-space: nowrap; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .syncing { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }


  /* AUTOSAVE */

// ═══ SETUP ═══
function toggleSetup() {
  var el = document.getElementById("setup-section");
  if (el.innerHTML) { el.innerHTML = ""; return; }
  el.innerHTML = '<div class="setup-card">' +
    '<div class="setup-title">GitHub Setup</div>' +
    '<input class="setup-input" id="token-input" type="password" placeholder="GitHub token (ghp_...)" value="' + (state.token || "") + '">' +
    '<button class="setup-btn" onclick="saveToken()">SAVE TOKEN</button>' +
    '</div>';

function saveToken() {
  var t = document.getElementById("token-input").value.trim();
  if (!t) { showToast("Enter a valid token", "error"); return; }
  state.token = t;
  localStorage.setItem("mitch_gh_token", t);
  document.getElementById("setup-section").innerHTML = "";
  showToast("Token saved", "success");
  updateHeroSub();
}

function updateHeroSub() {
  document.getElementById("hero-sub").textContent = state.token ? "Token configured \u2713" : "Set up GitHub token first";
}

// ═══ HOME ═══
function renderHome() {
  updateHeroSub();
  var wIds = Object.keys(state.workouts);
  var html = "";
  if (wIds.length === 0) {
    html = '<div class="empty-state"><div class="empty-icon">💪</div><div class="empty-text">No workouts yet.<br>Create your first one above.</div></div>';
  } else {
    wIds.forEach(function(id) {
      var w = state.workouts[id];
      var sessionCount = Object.keys(state.sessions).filter(function(k) { return k.startsWith(id + "_"); }).length;
      html += '<div class="workout-card' + (sessionCount > 0 ? " has-sessions" : "") + '" onclick="openSession(\'' + id + '\')">';
      html += '<div class="workout-icon">' + (w.icon || "💪") + "</div>";
      html += '<div class="workout-info"><div class="workout-name">' + w.name + "</div>";
      html += '<div class="workout-meta">' + w.exercises.length + " exercise" + (w.exercises.length !== 1 ? "s" : "");
      if (sessionCount > 0) html += " \u00b7 " + sessionCount + " session" + (sessionCount !== 1 ? "s" : "") + " logged";
      html += "</div></div>";
      if (sessionCount > 0) {
        html += '<span class="workout-session-count">' + sessionCount + "</span>";
      } else {
        html += '<span class="workout-arrow">›</span>';
      }
      html += '</div>';
      html += '<div style="display:flex;gap:8px;margin-top:-4px;margin-bottom:10px">';
      html += '<button onclick="event.stopPropagation();goBuilder(\'' + id + '\')" style="flex:1;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:0.06em;cursor:pointer">EDIT</button>';
      html += '</div>';
    });
  }
  document.getElementById("workout-list").innerHTML = html;
}

// ═══ BUILDER ═══
function goBuilder(workoutId) {
  state.currentWorkoutId = workoutId;
  var deleteBtn = document.getElementById("builder-delete-btn");
  if (workoutId && state.workouts[workoutId]) {
    var w = state.workouts[workoutId];
    document.getElementById("workout-name-input").value = w.name;
    document.getElementById("builder-title").textContent = "Edit Workout";
    state.builderExercises = JSON.parse(JSON.stringify(w.exercises));
    deleteBtn.style.display = "block";
  } else {
    document.getElementById("workout-name-input").value = "";
    document.getElementById("builder-title").textContent = "New Workout";
    state.builderExercises = [];
    deleteBtn.style.display = "none";
  }
  renderBuilderExercises();
  showScreen("builder");
}

    html += '<span style="font-size:20px">' + ex.icon + "</span>";
    html += '<span class="builder-ex-name">' + ex.name + "</span>";
    if (ex.muscles[0]) {
      html += '<span class="muscle-tag ' + tagClass + '">' + ex.muscles[0] + "</span>";
    }
    html += '<button class="builder-ex-remove" onclick="removeBuilderEx(' + i + ')">&#215;</button>';
    html += "</div>";
    if (!ex.isCardio) {
      html += '<div class="builder-scheme">';
      html += '<div><input class="builder-input" type="number" inputmode="numeric" placeholder="4" value="' + (ex.defaultSets || "") + '" onchange="updateBuilderEx(' + i + ',\'defaultSets\',this.value)" id="bsets-' + i + '"><div class="builder-input-label">SETS</div></div>';
      html += '<div><input class="builder-input" type="number" inputmode="numeric" placeholder="10" value="' + (ex.defaultReps || "") + '" onchange="updateBuilderEx(' + i + ',\'defaultReps\',this.value)" id="breps-' + i + '"><div class="builder-input-label">REPS</div></div>';
      html += '<div><input class="builder-input" type="number" inputmode="numeric" placeholder="90" value="' + (ex.restSec || 90) + '" onchange="updateBuilderEx(' + i + ',\'restSec\',this.value)" id="brest-' + i + '"><div class="builder-input-label">REST(s)</div></div>';
      html += "</div>";
    } else {
      html += '<div style="padding:4px 0;font-size:12px;color:var(--text-muted)">Cardio — track time, distance and intensity during the session</div>';
    }
    html += "</div>";
  });
  document.getElementById("builder-exercises").innerHTML = html;
}

function updateBuilderEx(i, field, val) {
  state.builderExercises[i][field] = field === "defaultSets" || field === "defaultReps" || field === "restSec" ? parseInt(val) || 0 : val;
}

function removeBuilderEx(i) {
  state.builderExercises.splice(i, 1);
  renderBuilderExercises();
}

function saveWorkout() {
  var name = document.getElementById("workout-name-input").value.trim();
  if (!name) { showToast("Give your workout a name", "error"); return; }
  if (state.builderExercises.length === 0) { showToast("Add at least one exercise", "error"); return; }

  // Live-read builder inputs before saving
  state.builderExercises.forEach(function(ex, i) {
    var sEl = document.getElementById("bsets-" + i);
    var rEl = document.getElementById("breps-" + i);
    var restEl = document.getElementById("brest-" + i);
    if (sEl) ex.defaultSets = parseInt(sEl.value) || 4;
    if (rEl) ex.defaultReps = parseInt(rEl.value) || 10;
    if (restEl) ex.restSec = parseInt(restEl.value) || 90;
  });

  var id = state.currentWorkoutId || "workout_" + Date.now();
  var icon = state.builderExercises[0] ? state.builderExercises[0].icon : "💪";
  state.workouts[id] = { id:id, name:name, icon:icon, exercises:JSON.parse(JSON.stringify(state.builderExercises)) };
  localStorage.setItem("mitch_workouts", JSON.stringify(state.workouts));
  showToast("Workout saved!", "success");
  goHome();
}

function confirmDeleteWorkout() {
  showConfirm("Delete workout?", "This will delete the workout template. Your logged sessions will be kept.", function() {
    if (state.currentWorkoutId && state.workouts[state.currentWorkoutId]) {
      delete state.workouts[state.currentWorkoutId];
      localStorage.setItem("mitch_workouts", JSON.stringify(state.workouts));
      showToast("Workout deleted", "");
      goHome();
    }
  });
}

// ═══ EXERCISE PICKER ═══
function goExercisePicker() {
  state.pickerCategory = "all";
  document.getElementById("picker-search").value = "";
  renderPickerCats();
  renderPicker();
  showScreen("picker");
}

function renderPickerCats() {
  var html = "";
  CATEGORIES.forEach(function(cat) {
    html += '<button class="picker-cat-btn' + (state.pickerCategory === cat.id ? " active" : "") + '" onclick="setPickerCat(\'' + cat.id + '\')">' + cat.label + "</button>";
  });
  document.getElementById("picker-cats").innerHTML = html;
}

function setPickerCat(cat) {
  state.pickerCategory = cat;
  renderPickerCats();
  renderPicker();
}

function renderPicker() {
  var search = document.getElementById("picker-search").value.toLowerCase();
  var filtered = EXERCISES.filter(function(ex) {
    var catMatch = state.pickerCategory === "all" || ex.tags.indexOf(state.pickerCategory) !== -1;
    var searchMatch = !search || ex.name.toLowerCase().indexOf(search) !== -1 || ex.muscles.join(" ").indexOf(search) !== -1;
    return catMatch && searchMatch;
  });

  var html = "";
  filtered.forEach(function(ex) {
    var tagHtml = ex.muscles.map(function(m) {
      return '<span class="muscle-tag ' + (MUSCLE_TAG_CLASS[m] || "mt-core") + '">' + m + "</span>";
    }).join("");
    html += '<div class="picker-ex-item" onclick="addExerciseToBuilder(\'' + ex.name.replace(/'/g, "\\'") + '\')">';
    html += '<span style="font-size:24px;width:36px;text-align:center">' + ex.icon + "</span>";
    html += '<div class="picker-ex-info"><div class="picker-ex-name">' + ex.name + "</div>";
    html += '<div class="picker-ex-meta">' + tagHtml;
    if (ex.tips) html += ' <span style="color:var(--text-muted);font-size:11px">' + ex.tips.substring(0, 50) + (ex.tips.length > 50 ? "..." : "") + "</span>";
    html += "</div></div>";
    html += '<div class="picker-ex-add">+</div>';
    html += "</div>";
  });

  if (filtered.length === 0) {
    html = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No exercises found.<br>Try a different search.</div></div>';
  }
  document.getElementById("picker-list").innerHTML = html;
}

function addExerciseToBuilder(name) {
  var ex = EXERCISES.find(function(e) { return e.name === name; });
  if (!ex) return;
  var already = state.builderExercises.find(function(e) { return e.name === name; });
  if (already) { showToast("Already added", ""); return; }
  var exCopy = JSON.parse(JSON.stringify(ex));
  if (!exCopy.defaultSets) exCopy.defaultSets = 4;
  if (!exCopy.defaultReps) exCopy.defaultReps = 10;
  state.builderExercises.push(exCopy);
  showToast(name + " added", "success");
  goBuilder(null);
}

// ═══ SESSION ═══
function openSession(workoutId) {
  state.currentWorkoutId = workoutId;
  var w = state.workouts[workoutId];
  if (!w) return;
  state.sessionData = {};
  document.getElementById("session-title").textContent = w.name;
  document.getElementById("session-notes").value = "";
  var today = new Date().toLocaleDateString("en-AU", { weekday:"long", day:"numeric", month:"long" });
  var html = '<div class="session-meta"><div class="session-meta-date">' + today.toUpperCase() + "</div>";
  html += '<div class="session-meta-name">' + w.name + "</div></div>";

  w.exercises.forEach(function(ex, ei) {
    state.sessionData[ex.name] = { restSec: ex.restSec || 90, sets: [] };
    var numSets = ex.defaultSets || 4;
    for (var s = 0; s < numSets; s++) {
      state.sessionData[ex.name].sets.push({ kg:"", reps:"", done:false });
    }

    if (ex.isCardio) {
      var cFields = ex.cardioFields || ["distance","time","intensity"];
      var cIcons = { km:"📏", min:"⏱", pace:"🏃", speed:"⚡", resistance:"🎛", m:"📏", spm:"🚣", floors:"🪜", level:"🎛" };
      html += '<div class="cardio-block"><div class="cardio-header">';
      html += '<span class="cardio-icon">' + ex.icon + "</span>";
      html += '<span class="cardio-name">' + ex.name + "</span></div>";
      html += '<div class="cardio-inputs">';
      cFields.forEach(function(f, fi) {
        html += '<div class="cardio-input-wrap">';
        html += '<input class="cardio-input" type="number" inputmode="decimal" placeholder="—" id="cardio-' + ei + '-' + fi + '">';
        html += '<div class="cardio-lbl">' + (cIcons[f] || "") + " " + f.toUpperCase() + "</div></div>";
      });
      html += "</div>";
      html += '<div class="cardio-done-row"><button class="cardio-done-btn" id="cdone-' + ei + '" onclick="markCardioDone(' + ei + ')">\u2713 MARK DONE</button></div>';
      html += "</div>";
      state.sessionData[ex.name] = { isCardio:true, fields:cFields, done:false };
    } else {
      var pr = getPR(ex.name);
      html += '<div class="exercise-block"><div class="exercise-header">';
      html += '<div class="exercise-name-text">' + ex.icon + " " + ex.name + "</div>";
      if (pr) html += '<span class="exercise-pr-chip">PR ' + pr + "kg</span>";
      var target = (ex.defaultSets || 4) + "x" + (ex.defaultReps || 10);
      html += '<span class="exercise-target-text">' + target + "</span></div>";
      html += '<div class="sets-area"><div class="sets-labels"><span class="sets-label">SET</span><span class="sets-label">KG</span><span class="sets-label">REPS</span><span class="sets-label"></span></div>';
      for (var s2 = 0; s2 < numSets; s2++) {
        html += renderSetRow(ei, s2);
      }
      html += '<button class="add-set-btn" onclick="addSet(' + ei + ',' + (ex.restSec || 90) + ')">+ ADD SET</button>';
      html += "</div></div>";
    }
  });

  document.getElementById("session-content").innerHTML = html;
  document.getElementById("session-scroll").scrollTop = 0;
  sessionActive = true;
  showScreen("session");
  // Check for autosave
  var draft = checkForAutosave(workoutId);
  if (draft) showRecoverBanner(draft, workoutId);
}

function renderSetRow(ei, si) {
  return '<div class="set-row" id="setrow-' + ei + '-' + si + '">' +
    '<span class="set-num">' + (si + 1) + "</span>" +
    '<input class="set-input" type="number" inputmode="decimal" placeholder="kg" id="kg-' + ei + '-' + si + '" onchange="setVal(' + ei + ',' + si + ',\'kg\',this.value)">' +
    '<input class="set-input" type="number" inputmode="numeric" placeholder="reps" id="reps-' + ei + '-' + si + '" onchange="setVal(' + ei + ',' + si + ',\'reps\',this.value)">' +
    '<button class="set-done-btn" id="done-' + ei + '-' + si + '" onclick="markDone(' + ei + ',' + si + ')">&#10003;</button>' +
    "</div>";
}

function getExName(ei) {
  var w = state.workouts[state.currentWorkoutId];
  return w && w.exercises[ei] ? w.exercises[ei].name : null;
}

function setVal(ei, si, field, val) {
  var n = getExName(ei);
  if (!n || !state.sessionData[n]) return;
  while (state.sessionData[n].sets.length <= si) state.sessionData[n].sets.push({ kg:"", reps:"", done:false });
  state.sessionData[n].sets[si][field] = val;
  triggerAutosave();
}

function markDone(ei, si) {
  var n = getExName(ei);
  if (!n) return;
  var kgEl = document.getElementById("kg-" + ei + "-" + si);
  var repsEl = document.getElementById("reps-" + ei + "-" + si);
  if (kgEl && kgEl.value) state.sessionData[n].sets[si].kg = kgEl.value;
  if (repsEl && repsEl.value) state.sessionData[n].sets[si].reps = repsEl.value;
  var was = state.sessionData[n].sets[si].done;
  state.sessionData[n].sets[si].done = !was;
  var btn = document.getElementById("done-" + ei + "-" + si);
  var kEl = document.getElementById("kg-" + ei + "-" + si);
  var rEl = document.getElementById("reps-" + ei + "-" + si);
  if (!was) {
    btn.classList.add("done");
    if (kEl) kEl.classList.add("completed");
    if (rEl) rEl.classList.add("completed");
    var w = state.workouts[state.currentWorkoutId];
    var restSec = w && w.exercises[ei] ? (w.exercises[ei].restSec || 90) : 90;
    if (restSec > 0) startTimer(restSec);
    triggerAutosave();
  } else {
    btn.classList.remove("done");
    if (kEl) kEl.classList.remove("completed");
    if (rEl) rEl.classList.remove("completed");
  }
}

function markCardioDone(ei) {
  var n = getExName(ei);
  if (!n) return;
  state.sessionData[n].done = true;
  var btn = document.getElementById("cdone-" + ei);
  if (btn) { btn.classList.add("done"); btn.textContent = "\u2713 DONE"; }
  // Read field values
  var fields = state.sessionData[n].fields || [];
  state.sessionData[n].values = {};
  fields.forEach(function(f, fi) {
    var el = document.getElementById("cardio-" + ei + "-" + fi);
    if (el) state.sessionData[n].values[f] = el.value;
  });
  showToast("Cardio logged!", "success");
  triggerAutosave();
}

function addSet(ei, restSec) {
  var n = getExName(ei);
  if (!n) return;
  var si = state.sessionData[n].sets.length;
  state.sessionData[n].sets.push({ kg:"", reps:"", done:false });
  state.sessionData[n].restSec = restSec;
  var setsArea = document.querySelector("#setrow-" + ei + "-" + (si - 1) + " ~ .add-set-btn") ||
    document.getElementById("setrow-" + ei + "-" + (si - 1));
  var parent = document.querySelector("[id='setrow-" + ei + "-" + (si-1) + "']");
  if (parent && parent.parentNode) {
    var addBtn = parent.parentNode.querySelector(".add-set-btn");
    var row = document.createElement("div");
    row.innerHTML = renderSetRow(ei, si);
    parent.parentNode.insertBefore(row.firstChild, addBtn);
  }
  triggerAutosave();
}

// ═══ PR ═══
function getPR(exName) {
  var best = null;
  Object.values(state.sessions).forEach(function(session) {
    if (session.exercises && session.exercises[exName]) {
      session.exercises[exName].forEach(function(set) {
        if (set.kg && set.done) {
          var w2 = parseFloat(set.kg);
          if (!best || w2 > best) best = w2;
        }
      });
    }
  });
  return best;
}

// ═══ SAVE SESSION ═══
function saveSession() {
  var w = state.workouts[state.currentWorkoutId];
  if (!w) return;
  var notes = document.getElementById("session-notes").value;
  var key = state.currentWorkoutId + "_" + Date.now();
  var exercises = {};

  w.exercises.forEach(function(ex, ei) {
    if (state.sessionData[ex.name]) {
      if (state.sessionData[ex.name].isCardio) {
        exercises[ex.name] = { isCardio:true, done:state.sessionData[ex.name].done, values:state.sessionData[ex.name].values || {} };
      } else {
        var sets = state.sessionData[ex.name].sets;
        sets.forEach(function(set, si) {
          var kEl = document.getElementById("kg-" + ei + "-" + si);
          var rEl = document.getElementById("reps-" + ei + "-" + si);
          if (kEl && kEl.value) set.kg = kEl.value;
          if (rEl && rEl.value) set.reps = rEl.value;
        });
        exercises[ex.name] = sets;
      }
    }
  });

  var sessionObj = {
    workoutId: state.currentWorkoutId,
    workoutName: w.name,
    date: new Date().toISOString(),
    notes: notes,
    exercises: exercises
  };

  state.sessions[key] = sessionObj;
  localStorage.setItem("mitch_sessions", JSON.stringify(state.sessions));
  clearAutosave(state.currentWorkoutId);
  sessionActive = false;

  if (state.token) {
    pushSessionToGitHub(key, sessionObj);
  } else {
    showToast("Saved locally", "success");
    goHome();
  }
}

function pushSessionToGitHub(key, sessionObj) {
  var path = "data/sessions/" + key + ".json";
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(sessionObj, null, 2))));
  fetch("https://api.github.com/repos/" + state.repo + "/contents/" + path, {
    method: "PUT",
    headers: { "Authorization": "token " + state.token, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({ message: "Log session: " + key, content: content })
  }).then(function(r) {
    if (r.ok) { showToast("Saved to GitHub \u2713", "success"); }
    else { showToast("Saved locally (GitHub error)", ""); }
    goHome();
  }).catch(function() {
    showToast("Saved locally (offline)", "success");
    goHome();
  });
}

// ═══ SYNC ═══
function syncFromGitHub() {
  if (!state.token) { showToast("Set up your GitHub token first", "error"); return; }
  var btn = document.getElementById("sync-btn");
  var statusEl = document.getElementById("sync-status");
  btn.textContent = "SYNCING...";
  btn.disabled = true;
  if (statusEl) statusEl.textContent = "Syncing from GitHub...";

  // Sync sessions
  fetch("https://api.github.com/repos/" + state.repo + "/contents/data/sessions", {
    headers: { "Authorization": "token " + state.token, "Accept": "application/vnd.github.v3+json" }
  }).then(function(r) {
    if (r.status === 404) return [];
    return r.json();
  }).then(function(files) {
    if (!Array.isArray(files)) files = [];
    var jsonFiles = files.filter(function(f) { return f.name.endsWith(".json"); });
    if (jsonFiles.length === 0) {
      finishSync(0);
      return;
    }
    Promise.all(jsonFiles.map(function(file) {
      return fetch(file.download_url).then(function(r) { return r.json(); }).then(function(d) { return { key: file.name.replace(".json",""), data:d }; });
    })).then(function(results) {
      results.forEach(function(r) { state.sessions[r.key] = r.data; });
      localStorage.setItem("mitch_sessions", JSON.stringify(state.sessions));
      finishSync(results.length);
    }).catch(function() { finishSync(0); });
  }).catch(function() { finishSync(0); });

  // Also sync workouts if stored on GitHub
  fetch("https://api.github.com/repos/" + state.repo + "/contents/data/workouts.json", {
    headers: { "Authorization": "token " + state.token, "Accept": "application/vnd.github.v3+json" }
  }).then(function(r) {
    if (!r.ok) return null;
    return r.json();
  }).then(function(file) {
    if (!file || !file.download_url) return;
    return fetch(file.download_url).then(function(r) { return r.json(); }).then(function(workouts) {
      Object.assign(state.workouts, workouts);
      localStorage.setItem("mitch_workouts", JSON.stringify(state.workouts));
      renderHome();
    });
  }).catch(function() {});
}

function finishSync(count) {
  var btn = document.getElementById("sync-btn");
  var statusEl = document.getElementById("sync-status");
  btn.textContent = "SYNC";
  btn.disabled = false;
  btn.classList.remove("syncing");
  var t = new Date().toLocaleTimeString("en-AU", { hour:"2-digit", minute:"2-digit" });
  if (statusEl) statusEl.textContent = count > 0 ? "Last sync: " + t + " \u00b7 " + count + " session(s)" : "Last sync: " + t + " \u00b7 No sessions yet";
  if (count > 0) { showToast("Synced " + count + " session(s)", "success"); renderHome(); }
}

// Sync workouts to GitHub when saved
function pushWorkoutsToGitHub() {
  if (!state.token) return;
  var path = "data/workouts.json";
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(state.workouts, null, 2))));
  fetch("https://api.github.com/repos/" + state.repo + "/contents/" + path, {
    headers: { "Authorization": "token " + state.token, "Accept": "application/vnd.github.v3+json" }
  }).then(function(r) { return r.ok ? r.json() : null; }).then(function(existing) {
    var body = { message: "Update workouts", content: content };
    if (existing && existing.sha) body.sha = existing.sha;
    return fetch("https://api.github.com/repos/" + state.repo + "/contents/" + path, {
      method: "PUT",
      headers: { "Authorization": "token " + state.token, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }).catch(function() {});
}

// ═══ HISTORY ═══
function showHistory() {
  var w = state.workouts[state.currentWorkoutId];
  if (!w) return;
  document.getElementById("history-title").textContent = w.name + " History";
  var sessions = Object.entries(state.sessions)
    .filter(function(e) { return e[1].workoutId === state.currentWorkoutId; })
    .sort(function(a, b) { return new Date(b[1].date) - new Date(a[1].date); });

  if (sessions.length === 0) {
    document.getElementById("history-content").innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No sessions logged yet for this workout.</div></div>';
  } else {
    var html = '<div style="padding:16px">';
    sessions.forEach(function(entry) {
      var session = entry[1];
      var date = new Date(session.date).toLocaleDateString("en-AU", { weekday:"short", day:"numeric", month:"short", year:"numeric" });
      html += '<div class="history-item"><div class="history-date">' + date.toUpperCase() + "</div>";
      Object.entries(session.exercises).forEach(function(exEntry) {
        var exName = exEntry[0];
        var sets = exEntry[1];
        if (Array.isArray(sets) && sets.length > 0) {
          var best = sets.reduce(function(b, s) { return parseFloat(s.kg) > parseFloat(b.kg || 0) ? s : b; }, sets[0]);
          var doneSets = sets.filter(function(s) { return s.done; }).length;
          html += '<div class="history-ex-row">';
          html += '<span class="history-ex-name">' + exName + "</span>";
          html += '<span class="history-ex-best">' + doneSets + " sets";
          if (best.kg) html += " \u00b7 " + best.kg + "kg top";
          html += "</span></div>";
        } else if (sets && sets.isCardio && sets.done) {
          html += '<div class="history-ex-row">';
          html += '<span class="history-ex-name">' + exName + "</span>";
          var vals = Object.entries(sets.values || {}).map(function(v) { return v[1] + " " + v[0]; }).join(" \u00b7 ");
          html += '<span class="history-ex-best">' + (vals || "Done") + "</span></div>";
        }
      });
      if (session.notes) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic">"' + session.notes + '"</div>';
      html += "</div>";
    });
    html += "</div>";
    document.getElementById("history-content").innerHTML = html;
  }
  showScreen("history");
}

// ═══ TIMER ═══
function startTimer(sec) {
  stopTimer();
  state.timerSec = sec;
  document.getElementById("rest-timer").classList.add("show");
  document.getElementById("rest-count").classList.remove("done");
  updateTimerDisplay();
  state.timerInterval = setInterval(function() {
    state.timerSec--;
    updateTimerDisplay();
    if (state.timerSec <= 0) {
      clearInterval(state.timerInterval);
      document.getElementById("rest-count").textContent = "GO!";
      document.getElementById("rest-count").classList.add("done");
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  document.getElementById("rest-timer").classList.remove("show");
}
function updateTimerDisplay() {
  var m = Math.floor(state.timerSec / 60);
  var s = state.timerSec % 60;
  document.getElementById("rest-count").textContent = m + ":" + (s < 10 ? "0" : "") + s;
}

// ═══ CONFIRM ═══
function showConfirm(title, text, callback) {
  document.getElementById("confirm-title").textContent = title;
  document.getElementById("confirm-text").textContent = text;
  state.confirmCallback = callback;
  document.getElementById("confirm-ok").onclick = function() { closeConfirm(); if (state.confirmCallback) state.confirmCallback(); };
  document.getElementById("confirm-overlay").classList.add("show");
}
function closeConfirm() { document.getElementById("confirm-overlay").classList.remove("show"); }

// ═══ TOAST ═══
function showToast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + (type || "");
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2800);
}

// ═══ NAVIGATION ═══
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
}
function goHome() { stopTimer(); sessionActive = false; showScreen("home"); renderHome(); }
function goSession() { showScreen("session"); }

// ═══ ANALYSIS ═══
function renderAnalysis() {
  var sessions = Object.values(state.sessions);
  var el = document.getElementById("analysis-content");

  if (sessions.length === 0) {
    el.innerHTML = '<div class="no-data" style="padding:4rem 1rem">' +
      '<div style="font-size:48px;margin-bottom:12px">📊</div>' +
      '<div style="font-size:15px;color:var(--text-dim);margin-bottom:8px">No sessions logged yet</div>' +
      '<div style="font-size:13px">Complete some workouts and come back here to see your progress.</div>' +
      '</div>';
    return;
  }

  var html = "";

  // Link to standalone analysis page
  html += '<div class="link-banner">' +
    '<div><div class="link-banner-text">Full analysis dashboard</div>' +
    '<div class="link-banner-url">rjah-labs.github.io/mitch-fitness/analysis.html</div></div>' +
    '<button class="link-banner-copy" onclick="window.open(\'analysis.html\',\'_blank\')">OPEN ↗</button>' +
    '</div>';

  // OVERVIEW STATS
  var totalSessions = sessions.length;
  var totalSets = 0;
  var totalKg = 0;
  var uniqueWorkouts = new Set();
  sessions.forEach(function(s) {
    uniqueWorkouts.add(s.workoutId);
    Object.values(s.exercises || {}).forEach(function(sets) {
      if (Array.isArray(sets)) {
        sets.forEach(function(set) {
          if (set.done) {
            totalSets++;
            if (set.kg) totalKg += parseFloat(set.kg) * (parseInt(set.reps) || 1);
          }
        });
      }
    });
  });

  // Streak
  var streak = calcStreak(sessions);
  var totalTons = (totalKg / 1000).toFixed(1);

  html += '<div class="analysis-stat-grid">';
  html += '<div class="analysis-stat"><div class="analysis-stat-val purple">' + totalSessions + '</div><div class="analysis-stat-lbl">SESSIONS</div></div>';
  html += '<div class="analysis-stat"><div class="analysis-stat-val green">' + streak + '</div><div class="analysis-stat-lbl">DAY STREAK</div></div>';
  html += '<div class="analysis-stat"><div class="analysis-stat-val amber">' + totalSets + '</div><div class="analysis-stat-lbl">TOTAL SETS</div></div>';
  html += '<div class="analysis-stat"><div class="analysis-stat-val pink">' + totalTons + 't</div><div class="analysis-stat-lbl">TOTAL VOLUME</div></div>';
  html += '</div>';

  // FREQUENCY HEATMAP (last 10 weeks)
  html += '<div class="analysis-section">';
  html += '<div class="analysis-section-title">Training frequency — last 10 weeks</div>';
  html += '<div class="chart-wrap">';
  html += buildFrequencyGrid(sessions);
  html += '</div></div>';

  // WORKOUT BREAKDOWN
  html += '<div class="analysis-section">';
  html += '<div class="analysis-section-title">Sessions by workout</div>';
  html += '<div class="chart-wrap">';
  html += buildWorkoutBreakdown(sessions);
  html += '</div></div>';

  // PERSONAL RECORDS
  html += '<div class="analysis-section">';
  html += '<div class="analysis-section-title">Personal records</div>';
  html += buildPRList(sessions);
  html += '</div>';

  // WEIGHT PROGRESSION
  html += '<div class="analysis-section">';
  html += '<div class="analysis-section-title">Weight progression</div>';
  html += '<div class="chart-wrap">';
  html += '<div class="chart-sub">Select an exercise to see your weight over time</div>';
  html += buildExercisePicker(sessions);
  html += '<div id="progression-chart"></div>';
  html += '</div></div>';

  // VOLUME PER SESSION
  html += '<div class="analysis-section">';
  html += '<div class="analysis-section-title">Session volume (kg moved)</div>';
  html += '<div class="chart-wrap">';
  html += buildVolumeChart(sessions);
  html += '</div></div>';

  el.innerHTML = html;

  // Render default exercise chart if exercises exist
  var firstEx = getTopExercise(sessions);
  if (firstEx) {
    document.getElementById("ex-picker").value = firstEx;
    renderProgressionChart(firstEx, sessions);
  }
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  var dates = sessions.map(function(s) {
    return new Date(s.date).toDateString();
  });
  var unique = Array.from(new Set(dates)).sort(function(a,b) { return new Date(b)-new Date(a); });
  var streak = 0;
  var today = new Date();
  for (var i = 0; i < unique.length; i++) {
    var d = new Date(unique[i]);
    var diff = Math.round((today - d) / (1000*60*60*24));
    if (diff === i || diff === i+1) streak++;
    else break;
  }
  return streak;
}

function buildFrequencyGrid(sessions) {
  var sessionDates = {};
  sessions.forEach(function(s) {
    var d = new Date(s.date).toDateString();
    sessionDates[d] = (sessionDates[d] || 0) + 1;
  });

  var today = new Date();
  var startDate = new Date(today);
  startDate.setDate(startDate.getDate() - 69); // 10 weeks back
  // Align to Sunday
  var dayOfWeek = startDate.getDay();
  startDate.setDate(startDate.getDate() - dayOfWeek);

  var days = ['S','M','T','W','T','F','S'];
  var html = '<div class="freq-day-labels">';
  days.forEach(function(d) { html += '<div class="freq-day-lbl">' + d + '</div>'; });
  html += '</div><div class="freq-grid">';

  var cur = new Date(startDate);
  for (var i = 0; i < 70; i++) {
    var key = cur.toDateString();
    var count = sessionDates[key] || 0;
    var lvl = count === 0 ? '' : count === 1 ? 'l1' : count === 2 ? 'l2' : count === 3 ? 'l3' : 'l4';
    var isFuture = cur > today;
    html += '<div class="freq-cell ' + (isFuture ? '' : lvl) + '" title="' + key + (count ? ': ' + count + ' session(s)' : '') + '"></div>';
    cur.setDate(cur.getDate() + 1);
  }
  html += '</div>';
  return html;
}

function buildWorkoutBreakdown(sessions) {
  var counts = {};
  sessions.forEach(function(s) {
    var name = s.workoutName || s.workoutId || 'Unknown';
    counts[name] = (counts[name] || 0) + 1;
  });
  var entries = Object.entries(counts).sort(function(a,b) { return b[1]-a[1]; });
  var max = entries.length ? entries[0][1] : 1;
  var html = '<div class="workout-breakdown">';
  entries.forEach(function(e) {
    var pct = Math.round((e[1]/max)*100);
    html += '<div class="wb-item"><div><div class="wb-name">' + e[0] + '</div>' +
      '<div class="wb-bar" style="width:' + pct + '%"></div></div>' +
      '<div class="wb-count">' + e[1] + 'x</div></div>';
  });
  html += '</div>';
  return html;
}

function buildPRList(sessions) {
  var prs = {};
  var prDates = {};
  sessions.forEach(function(s) {
    Object.entries(s.exercises || {}).forEach(function(entry) {
      var name = entry[0];
      var sets = entry[1];
      if (Array.isArray(sets)) {
        sets.forEach(function(set) {
          if (set.done && set.kg) {
            var w = parseFloat(set.kg);
            if (!prs[name] || w > prs[name]) {
              prs[name] = w;
              prDates[name] = new Date(s.date).toLocaleDateString('en-AU', {day:'numeric',month:'short'});
            }
          }
        });
      }
    });
  });
  var entries = Object.entries(prs).sort(function(a,b) { return b[1]-a[1]; });
  if (!entries.length) return '<div class="no-data">No PR data yet</div>';
  var html = '<div class="pr-list">';
  entries.forEach(function(e) {
    html += '<div class="pr-item"><div class="pr-name">' + e[0] + '<div class="pr-date">' + (prDates[e[0]]||'') + '</div></div>' +
      '<div class="pr-val">' + e[1] + 'kg</div></div>';
  });
  html += '</div>';
  return html;
}

function getTopExercise(sessions) {
  var counts = {};
  sessions.forEach(function(s) {
    Object.keys(s.exercises||{}).forEach(function(n) {
      if (Array.isArray(s.exercises[n])) counts[n] = (counts[n]||0)+1;
    });
  });
  var sorted = Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  return sorted.length ? sorted[0][0] : null;
}

function buildExercisePicker(sessions) {
  var names = new Set();
  sessions.forEach(function(s) {
    Object.entries(s.exercises||{}).forEach(function(e) {
      if (Array.isArray(e[1])) names.add(e[0]);
    });
  });
  var html = '<select class="chart-select" id="ex-picker" onchange="renderProgressionChart(this.value)">';
  Array.from(names).sort().forEach(function(n) {
    html += '<option value="' + n + '">' + n + '</option>';
  });
  html += '</select>';
  return html;
}

function renderProgressionChart(exName, sessions) {
  if (!sessions) sessions = Object.values(state.sessions);
  var points = [];
  sessions.forEach(function(s) {
    var sets = s.exercises && s.exercises[exName];
    if (Array.isArray(sets) && sets.length) {
      var best = null;
      sets.forEach(function(set) {
        if (set.done && set.kg) {
          var w = parseFloat(set.kg);
          if (!best || w > best) best = w;
        }
      });
      if (best) {
        points.push({ date: new Date(s.date), val: best });
      }
    }
  });
  points.sort(function(a,b){ return a.date-b.date; });

  var chartEl = document.getElementById("progression-chart");
  if (!chartEl) return;

  if (points.length < 2) {
    chartEl.innerHTML = '<div class="no-data">Need at least 2 sessions to show a trend</div>';
    return;
  }

  var maxVal = Math.max.apply(null, points.map(function(p){return p.val;}));
  var minVal = Math.min.apply(null, points.map(function(p){return p.val;}));
  var range = maxVal - minVal || 1;
  var W = 300; var H = 100; var PAD = 20;
  var innerW = W - PAD*2; var innerH = H - PAD*2;

  var coords = points.map(function(p, i) {
    var x = PAD + (i/(points.length-1))*innerW;
    var y = PAD + (1 - (p.val-minVal)/range)*innerH;
    return {x:x, y:y, val:p.val, date:p.date};
  });

  var pathD = coords.map(function(c,i){return (i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1);}).join(' ');
  var areaD = pathD + ' L'+(PAD+innerW).toFixed(1)+','+(PAD+innerH).toFixed(1)+' L'+PAD+','+(PAD+innerH).toFixed(1)+' Z';

  var dotsHtml = coords.map(function(c) {
    return '<circle cx="'+c.x.toFixed(1)+'" cy="'+c.y.toFixed(1)+'" r="3" fill="var(--purple)" title="'+c.val+'kg on '+c.date.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+'"/>';
  }).join('');

  // Labels
  var firstLbl = points[0].date.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  var lastLbl = points[points.length-1].date.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  var trend = points[points.length-1].val - points[0].val;
  var trendStr = trend >= 0 ? '+' + trend.toFixed(1) + 'kg' : trend.toFixed(1) + 'kg';
  var trendCol = trend >= 0 ? 'var(--green-light)' : 'var(--red)';

  chartEl.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
      '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--text-muted)">' + firstLbl + '</span>' +
      '<span style="font-family:\'DM Mono\',monospace;font-size:11px;color:'+trendCol+'">'+trendStr+' overall</span>' +
      '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--text-muted)">' + lastLbl + '</span>' +
    '</div>' +
    '<div class="line-chart">' +
    '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">' +
      '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="var(--purple)" stop-opacity="0.3"/>' +
        '<stop offset="100%" stop-color="var(--purple)" stop-opacity="0"/>' +
      '</linearGradient></defs>' +
      '<path d="'+areaD+'" fill="url(#lg)"/>' +
      '<path d="'+pathD+'" fill="none" stroke="var(--purple)" stroke-width="2" stroke-linejoin="round"/>' +
      dotsHtml +
    '</svg></div>' +
    '<div style="display:flex;justify-content:space-between;margin-top:4px">' +
      '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--text-muted)">LOW '+minVal+'kg</span>' +
      '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--amber)">BEST '+maxVal+'kg</span>' +
    '</div>';
}

function buildVolumeChart(sessions) {
  var sorted = sessions.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var last12 = sorted.slice(-12);
  if (!last12.length) return '<div class="no-data">No sessions yet</div>';

  var volumes = last12.map(function(s) {
    var vol = 0;
    Object.values(s.exercises||{}).forEach(function(sets) {
      if (Array.isArray(sets)) {
        sets.forEach(function(set) {
          if (set.done && set.kg && set.reps) vol += parseFloat(set.kg) * parseInt(set.reps);
        });
      }
    });
    return { date: new Date(s.date), vol: vol, name: s.workoutName || '' };
  });

  var maxVol = Math.max.apply(null, volumes.map(function(v){return v.vol;})) || 1;
  var html = '<div class="bar-chart">';
  volumes.forEach(function(v) {
    var pct = Math.round((v.vol/maxVol)*100);
    var lbl = v.date.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    var volStr = v.vol >= 1000 ? (v.vol/1000).toFixed(1)+'t' : v.vol+'kg';
    html += '<div class="bar-row">' +
      '<span class="bar-label">' + lbl + '</span>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--purple)">' +
        '<span class="bar-fill-val">' + volStr + (v.name ? ' \u00b7 '+v.name.substring(0,12) : '') + '</span>' +
      '</div></div></div>';
  });
  html += '</div>';
  return html;
}

// Make renderProgressionChart callable from select onchange
window.renderProgressionChart = function(exName) {
  renderProgressionChart(exName, Object.values(state.sessions));
};


// ═══ AUTOSAVE ═══
var autosaveTimer = null;

function getAutosaveKey(workoutId) {
  return "mitch_autosave_" + workoutId;
}

function triggerAutosave() {
  if (!state.currentWorkoutId) return;
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(function() { doAutosave(); }, 800);
}

function doAutosave() {
  if (!state.currentWorkoutId) return;
  var w = state.workouts[state.currentWorkoutId];
  if (!w) return;

  // Collect all current field values from DOM
  var snapshot = {};
  w.exercises.forEach(function(ex, ei) {
    if (state.sessionData[ex.name]) {
      var exData = JSON.parse(JSON.stringify(state.sessionData[ex.name]));
      if (!ex.isCardio) {
        exData.sets.forEach(function(set, si) {
          var kgEl = document.getElementById("kg-" + ei + "-" + si);
          var repsEl = document.getElementById("reps-" + ei + "-" + si);
          if (kgEl && kgEl.value) set.kg = kgEl.value;
          if (repsEl && repsEl.value) set.reps = repsEl.value;
        });
      } else {
        var fields = exData.fields || [];
        fields.forEach(function(f, fi) {
          var el = document.getElementById("cardio-" + ei + "-" + fi);
          if (el && el.value) {
            if (!exData.values) exData.values = {};
            exData.values[f] = el.value;
          }
        });
      }
      snapshot[ex.name] = exData;
    }
  });

  var notesEl = document.getElementById("session-notes");
  var draft = {
    workoutId: state.currentWorkoutId,
    date: new Date().toISOString().split('T')[0],
    savedAt: new Date().toISOString(),
    exercises: snapshot,
    notes: notesEl ? notesEl.value : ""
  };

  localStorage.setItem(getAutosaveKey(state.currentWorkoutId), JSON.stringify(draft));

  // Show autosave indicator
  var bar = document.getElementById("autosave-bar");
  var timeEl = document.getElementById("autosave-time");
  if (bar) {
    var t = new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    if (timeEl) timeEl.textContent = t;
    bar.classList.add("show");
    setTimeout(function() { bar.classList.remove("show"); }, 2000);
  }
}

function checkForAutosave(workoutId) {
  var key = getAutosaveKey(workoutId);
  var draft = localStorage.getItem(key);
  if (!draft) return null;
  try {
    var parsed = JSON.parse(draft);
    var today = new Date().toISOString().split('T')[0];
    // Only recover if from today
    if (parsed.date === today) return parsed;
    // If older than today, clear it
    localStorage.removeItem(key);
    return null;
  } catch(e) {
    return null;
  }
}

function clearAutosave(workoutId) {
  localStorage.removeItem(getAutosaveKey(workoutId));
}

function restoreAutosave(draft) {
  var w = state.workouts[state.currentWorkoutId];
  if (!w) return;

  // Restore notes
  var notesEl = document.getElementById("session-notes");
  if (notesEl && draft.notes) notesEl.value = draft.notes;

  // Restore exercise data
  w.exercises.forEach(function(ex, ei) {
    var saved = draft.exercises && draft.exercises[ex.name];
    if (!saved) return;

    if (ex.isCardio) {
      state.sessionData[ex.name] = saved;
      var fields = saved.fields || [];
      fields.forEach(function(f, fi) {
        var el = document.getElementById("cardio-" + ei + "-" + fi);
        if (el && saved.values && saved.values[f]) el.value = saved.values[f];
      });
      if (saved.done) {
        var btn = document.getElementById("cdone-" + ei);
        if (btn) { btn.classList.add("done"); btn.textContent = "✓ DONE"; }
      }
    } else {
      state.sessionData[ex.name] = saved;
      saved.sets.forEach(function(set, si) {
        var kgEl = document.getElementById("kg-" + ei + "-" + si);
        var repsEl = document.getElementById("reps-" + ei + "-" + si);
        var doneBtn = document.getElementById("done-" + ei + "-" + si);

        // Add extra rows if needed
        if (!kgEl) {
          addSet(ei, ex.restSec || 90);
          kgEl = document.getElementById("kg-" + ei + "-" + si);
          repsEl = document.getElementById("reps-" + ei + "-" + si);
          doneBtn = document.getElementById("done-" + ei + "-" + si);
        }

        if (kgEl && set.kg) kgEl.value = set.kg;
        if (repsEl && set.reps) repsEl.value = set.reps;
        if (set.done && doneBtn) {
          doneBtn.classList.add("done");
          if (kgEl) kgEl.classList.add("completed");
          if (repsEl) repsEl.classList.add("completed");
        }
      });
    }
  });

  showToast("Session restored ✓", "success");
}

function showRecoverBanner(draft, workoutId) {
  var savedAt = new Date(draft.savedAt);
  var timeStr = savedAt.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
  var banner = document.createElement('div');
  banner.className = 'recover-banner';
  banner.id = 'recover-banner';
  banner.innerHTML =
    '<div class="recover-title">Unsaved session found</div>' +
    '<div class="recover-text">You have an autosaved session from ' + timeStr + ' today. Want to restore it?</div>' +
    '<div class="recover-actions">' +
      '<button class="recover-btn" onclick="dismissRecover()">START FRESH</button>' +
      '<button class="recover-btn primary" onclick="doRestore()">RESTORE</button>' +
    '</div>';

  // Store draft for restore
  state.pendingDraft = draft;

  var scrollEl = document.getElementById("session-scroll");
  if (scrollEl) scrollEl.insertBefore(banner, scrollEl.firstChild);
}

function dismissRecover() {
  clearAutosave(state.currentWorkoutId);
  sessionActive = false;
  state.pendingDraft = null;
  var banner = document.getElementById("recover-banner");
  if (banner) banner.remove();
}

function doRestore() {
  var banner = document.getElementById("recover-banner");
  if (banner) banner.remove();
  if (state.pendingDraft) restoreAutosave(state.pendingDraft);
  state.pendingDraft = null;
}


// ═══ BEFOREUNLOAD GUARD ═══
var sessionActive = false;

window.addEventListener('beforeunload', function(e) {
  if (sessionActive && state.currentWorkoutId && checkForAutosave(state.currentWorkoutId)) {
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});

// ═══ INIT ═══
updateHeroSub();
renderHome();
var syncBtn = document.getElementById("sync-btn");
if (state.token) {
  setTimeout(function() {
    syncBtn.classList.remove("syncing");
    syncFromGitHub();
  }, 800);
} else {
  syncBtn.classList.remove("syncing");
}
</script>
